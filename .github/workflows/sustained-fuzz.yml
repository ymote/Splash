name: Sustained Fuzzing

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parser-and-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo install cargo-fuzz --version 0.13.2 --locked
      - run: cargo +nightly fmt --manifest-path fuzz/Cargo.toml --check
      - run: RUSTFLAGS='--cfg fuzzing' cargo +nightly check --locked --manifest-path fuzz/Cargo.toml
      - name: Differential canonical profile and VM fuzzing
        run: >
          RUSTFLAGS='--cfg fuzzing' cargo +nightly fuzz run --sanitizer none syntax --
          -max_total_time=600 -timeout=5 -rss_limit_mb=1024 -max_len=16384
          -dict=$GITHUB_WORKSPACE/fuzz/dictionaries/syntax.dict
        working-directory: fuzz
      - name: Bounded evaluator fuzzing
        run: >
          RUSTFLAGS='--cfg fuzzing' cargo +nightly fuzz run --sanitizer none execution --
          -max_total_time=600 -timeout=5 -rss_limit_mb=1024 -max_len=8192
          -dict=$GITHUB_WORKSPACE/fuzz/dictionaries/syntax.dict
        working-directory: fuzz
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sustained-fuzz-artifacts-${{ github.run_id }}
          path: fuzz/artifacts
          if-no-files-found: ignore
          retention-days: 14
